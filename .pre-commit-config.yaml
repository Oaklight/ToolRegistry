repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty check
        description: Type check src/ with ty.
        entry: ty check src/
        language: system
        pass_filenames: false
        require_serial: true
        types: [python]

  - repo: https://github.com/rohaquinlop/complexipy-pre-commit
    rev: v4.2.0
    hooks:
      - id: complexipy
        pass_filenames: false
        # TODO: remove file exclude after refactoring setup_routes in handlers.py
        args: [., -e, src/toolregistry/_vendor, -e, examples,
               -e, src/toolregistry/admin/handlers.py,
               -mx, "20"]
