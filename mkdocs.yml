site_name: ToolRegistry
site_description: 面向 OpenAI 兼容 LLM 应用的协议无关工具管理库
site_author: Peng Ding
site_url: https://toolregistry.readthedocs.io/zh-cn/
repo_name: Oaklight/ToolRegistry
repo_url: https://github.com/Oaklight/ToolRegistry
copyright: Copyright &copy; 2024 Peng Ding

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 跟随系统偏好
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/ToolRegistry
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/toolregistry/
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh-cn/
      lang: zh

nav:
  - 首页: index.md
  - 架构:
      - 概览: architecture/overview.md
      - 执行模式: usage/concurrency_modes.md
      - 命名空间: usage/namespace.md
  - 使用指南:
      - 安装: usage/installation.md
      - 基本用法: usage/basics.md
      - 函数调用: usage/function_calling.md
      - 集成:
          - 基于类的工具: usage/integrations/class.md
          - Hub 工具: usage/integrations/hub.md
          - MCP 工具: usage/integrations/mcp.md
          - OpenAPI 工具: usage/integrations/openapi.md
          - LangChain 工具: usage/integrations/langchain.md
      - 权限系统: usage/permissions.md
      - 最佳实践: usage/best_practices.md
      - LLM 供应商:
          - OpenAI Chat: usage/providers/openai_chat.md
          - OpenAI Response: usage/providers/openai_response.md
  - 示例:
      - 概览: examples/index.md
      - 连续工具调用: examples/consecutive_tool_calls.md
      - Hub 计算器: examples/hub_calculator.md
      - Hub 文件编辑: examples/hub_file_edit.md
      - Hub 网络搜索: examples/hub_websearch.md
      - LangChain ArXiv: examples/langchain_arxiv.md
      - MCP 计算器: examples/mcp_calculator.md
      - MCP 多样传输: examples/mcp_diverse_transport.md
      - OpenAPI 计算器: examples/openapi_calculator.md
  - API 参考:
      - 概览: api/index.md
      - 核心类:
          - 概览: api/core.md
          - ToolRegistry: api/core/toolregistry.md
          - Tool: api/core/tool.md
          - Executor: api/core/executor.md
          - Events: api/events.md
          - 权限: api/permissions.md
      - 集成:
          - 概览: api/integrations.md
          - OpenAPI: api/integrations/openapi.md
          - MCP: api/integrations/mcp.md
          - LangChain: api/integrations/langchain.md
          - Native: api/integrations/native.md
      - 工具包装器:
          - 概览: api/wrappers.md
          - BaseToolWrapper: api/wrappers/basetoolwrapper.md
          - MCP ToolWrapper: api/wrappers/mcp.md
          - OpenAPI ToolWrapper: api/wrappers/openapi.md
          - LangChain ToolWrapper: api/wrappers/langchain.md
      - 辅助类: api/helpers.md
      - 类型: api/types.md
  - 管理面板: admin-panel.md
  - 生态系统: ecosystem.md
  - 更新日志: changelog.md
  - Hub 工具: https://toolregistry-hub.readthedocs.io/
  - Server: https://toolregistry-server.readthedocs.io/
