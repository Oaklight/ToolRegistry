site_name: ToolRegistry
site_description: 异构工具的统一管理层，适配 OpenAI、Anthropic 和 Gemini 兼容 API
site_author: Peng Ding
site_url: https://toolregistry.readthedocs.io/zh-cn/latest
repo_name: Oaklight/ToolRegistry
repo_url: https://github.com/Oaklight/ToolRegistry
copyright: Copyright &copy; 2024 Peng Ding

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 跟随系统偏好
    - media: "(prefers-color-scheme)"
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - header.autohide
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - content.footnote.tooltips

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        快速开始:
          - usage/installation.md
          - usage/basics.md
          - usage/function_calling.md
          - usage/best_practices.md
        指南:
          - architecture/overview.md
          - usage/concurrency_modes.md
          - usage/namespace.md
          - usage/integrations/class.md
          - usage/integrations/hub.md
          - usage/integrations/mcp.md
          - usage/integrations/openapi.md
          - usage/integrations/langchain.md
          - usage/tool_discovery.md
          - usage/think_augmented.md
          - usage/result_management.md
          - usage/permissions.md
          - usage/message_building.md
          - usage/configuration.md
        示例:
          - examples/index.md
          - examples/consecutive_tool_calls.md
          - examples/hub_calculator.md
          - examples/hub_file_edit.md
          - examples/hub_websearch.md
          - examples/langchain_arxiv.md
          - examples/mcp_calculator.md
          - examples/mcp_diverse_transport.md
          - examples/openapi_calculator.md
        参考:
          - api/index.md
          - api/core.md
          - api/core/toolregistry.md
          - api/core/tool.md
          - api/core/executor.md
          - api/events.md
          - api/permissions.md
          - api/integrations.md
          - api/integrations/openapi.md
          - api/integrations/mcp.md
          - api/integrations/langchain.md
          - api/integrations/native.md
          - api/wrappers.md
          - api/wrappers/basetoolwrapper.md
          - api/wrappers/mcp.md
          - api/wrappers/openapi.md
          - api/wrappers/langchain.md
          - api/helpers.md
          - api/types.md
          - usage/providers/openai_chat.md
          - usage/providers/openai_response.md
          - usage/providers/anthropic.md
          - usage/providers/gemini.md
          - admin/index.md
          - admin/configuration.md
          - admin/execution-logging.md
          - admin/rest-api.md
          - admin/web-ui.md
          - admin/security.md
          - admin/examples.md
        生态系统:
          - ecosystem.md
          - migration.md
        更新日志:
          - changelog.md

extra_css:
  - stylesheets/toolregistry.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/ToolRegistry
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/toolregistry/
  alternate:
    - name: English
      link: /en/latest/
      lang: en
    - name: 中文
      link: /zh-cn/latest/
      lang: zh

nav:
  - 首页: index.md
  - 快速开始:
      - 安装: usage/installation.md
      - 快速上手: usage/basics.md
      - 函数调用: usage/function_calling.md
      - 最佳实践: usage/best_practices.md
  - 指南:
      - 核心概念:
          - 架构: architecture/overview.md
          - 执行模式: usage/concurrency_modes.md
          - 命名空间: usage/namespace.md
      - 集成:
          - 基于类的工具: usage/integrations/class.md
          - MCP 工具: usage/integrations/mcp.md
          - OpenAPI 工具: usage/integrations/openapi.md
          - LangChain 工具: usage/integrations/langchain.md
          - Hub 工具: usage/integrations/hub.md
      - 高级主题:
          - 程序化工具调用: usage/programmatic_tool_calling.md
          - 工具发现: usage/tool_discovery.md
          - 理由增强调用: usage/think_augmented.md
          - 结果大小管理: usage/result_management.md
          - 权限系统: usage/permissions.md
          - 消息构建: usage/message_building.md
          - 声明式配置: usage/configuration.md
  - 示例:
      - 概览: examples/index.md
      - 连续工具调用: examples/consecutive_tool_calls.md
      - Hub 计算器: examples/hub_calculator.md
      - Hub 文件编辑: examples/hub_file_edit.md
      - Hub 网络搜索: examples/hub_websearch.md
      - LangChain ArXiv: examples/langchain_arxiv.md
      - MCP 计算器: examples/mcp_calculator.md
      - MCP 多样传输: examples/mcp_diverse_transport.md
      - OpenAPI 计算器: examples/openapi_calculator.md
  - 参考:
      - API 概览: api/index.md
      - 核心:
          - 概览: api/core.md
          - ToolRegistry: api/core/toolregistry.md
          - Tool: api/core/tool.md
          - Executor: api/core/executor.md
          - 运行时 (PTC): api/core/runtimes.md
          - Events: api/events.md
          - 权限: api/permissions.md
      - 集成:
          - 概览: api/integrations.md
          - OpenAPI: api/integrations/openapi.md
          - MCP: api/integrations/mcp.md
          - LangChain: api/integrations/langchain.md
          - Native: api/integrations/native.md
      - 工具包装器:
          - 概览: api/wrappers.md
          - BaseToolWrapper: api/wrappers/basetoolwrapper.md
          - MCP ToolWrapper: api/wrappers/mcp.md
          - OpenAPI ToolWrapper: api/wrappers/openapi.md
          - LangChain ToolWrapper: api/wrappers/langchain.md
      - 辅助类: api/helpers.md
      - 类型: api/types.md
      - LLM API 格式:
          - OpenAI Chat: usage/providers/openai_chat.md
          - OpenAI Response: usage/providers/openai_response.md
          - Anthropic: usage/providers/anthropic.md
          - Google Gemini: usage/providers/gemini.md
      - 管理面板:
          - 概览: admin/index.md
          - 配置: admin/configuration.md
          - 执行日志: admin/execution-logging.md
          - REST API: admin/rest-api.md
          - Web UI 指南: admin/web-ui.md
          - 安全考虑: admin/security.md
          - 示例: admin/examples.md
  - 生态系统:
      - 概览: ecosystem.md
      - 迁移指南: migration.md
      - Hub 工具: https://toolregistry-hub.readthedocs.io/
      - Server: https://toolregistry-server.readthedocs.io/
  - 更新日志: changelog.md
