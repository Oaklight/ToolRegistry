site_name: ToolRegistry
site_description: A Protocol-Agnostic Tool Management Library for Function-Calling LLMs (OpenAI, Anthropic, Gemini, LangChain, MCP)
site_author: Peng Ding
site_url: https://toolregistry.readthedocs.io/en/latest
repo_name: Oaklight/ToolRegistry
repo_url: https://github.com/Oaklight/ToolRegistry
copyright: Copyright &copy; 2024 Peng Ding

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Usage:
          - architecture/overview.md
          - usage/concurrency_modes.md
          - usage/namespace.md
          - usage/installation.md
          - usage/basics.md
          - usage/function_calling.md
          - usage/integrations/class.md
          - usage/integrations/hub.md
          - usage/integrations/mcp.md
          - usage/integrations/openapi.md
          - usage/integrations/langchain.md
          - usage/tool_discovery.md
          - usage/think_augmented.md
          - usage/result_management.md
          - usage/permissions.md
          - usage/message_building.md
          - usage/configuration.md
          - usage/best_practices.md
          - usage/providers/openai_chat.md
          - usage/providers/openai_response.md
          - usage/providers/anthropic.md
          - usage/providers/gemini.md
        Examples:
          - examples/index.md
          - examples/consecutive_tool_calls.md
          - examples/hub_calculator.md
          - examples/hub_file_edit.md
          - examples/hub_websearch.md
          - examples/langchain_arxiv.md
          - examples/mcp_calculator.md
          - examples/mcp_diverse_transport.md
          - examples/openapi_calculator.md
        API Reference:
          - api/index.md
          - api/core.md
          - api/core/toolregistry.md
          - api/core/tool.md
          - api/core/executor.md
          - api/events.md
          - api/permissions.md
          - api/integrations.md
          - api/integrations/openapi.md
          - api/integrations/mcp.md
          - api/integrations/langchain.md
          - api/integrations/native.md
          - api/wrappers.md
          - api/wrappers/basetoolwrapper.md
          - api/wrappers/mcp.md
          - api/wrappers/openapi.md
          - api/wrappers/langchain.md
          - api/helpers.md
          - api/types.md
        Admin Panel:
          - admin/index.md
          - admin/configuration.md
          - admin/execution-logging.md
          - admin/rest-api.md
          - admin/web-ui.md
          - admin/security.md
          - admin/examples.md
        Resources:
          - ecosystem.md
          - migration.md
          - changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/ToolRegistry
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/toolregistry/
  alternate:
    - name: English
      link: /en/latest/
      lang: en
    - name: 中文
      link: /zh-cn/latest/
      lang: zh

